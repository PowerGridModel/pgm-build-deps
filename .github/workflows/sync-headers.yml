name: Sync headers from upstream repository (brew)

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish the headers'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 2 * * 1" # Runs at 02:00 UTC every Monday

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-main
  cancel-in-progress: true

jobs:
  sync-headers:
    name: "Sync headers from upstream repository (brew)"
    runs-on: ubuntu-latest

    steps:
      - name: generate GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          client-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Enable brew
        run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Install brew
        run: |
           brew update
           brew install nlohmann-json boost eigen msgpack-cxx doctest cli11 cmake

      - name: copy headers
        run: |
          ./sync-headers.sh

      - name: License scan - entire repository
        uses: fossology/fossology-action@77ce100b60db6a92aa122c9103908dda44a06514 # v1
        continue-on-error: true
        with:
            scan_mode: repo
            scanners: 'nomos ojo'
            report_format: 'SPDX_JSON'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Remove files with non-accepted license
        id: license-cleanup
        run: |
          ./remove-bad-licenses.sh

      - name: License cleanup completed
        run: echo "License cleanup completed successfully"

      - name: Upload Scan Results Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: license-scan-results
          path: results/

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
          
      - name: build wheel
        run: |
          echo "v$(date +'%Y.%m.%d').$GITHUB_RUN_NUMBER" > VERSION
          uv build
          ls dist/
          echo "VERSION=v$(cat VERSION)" >> $GITHUB_ENV

      - name: test in cmake
        run: |
          uv tool install dist/*.whl
          pgm-build-setup-ga-ci
          cd test_cmake
          cmake -S . -B build
          cmake --build build
          ./build/test_cmake

      - name: publish
        if: ${{ inputs.force_publish || (github.event_name == 'schedule') }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            dist/*.whl
            results/*
          draft: false
          prerelease: false
          target_commitish: ${{ github.sha }}
          token: ${{ steps.generate-token.outputs.token }}
