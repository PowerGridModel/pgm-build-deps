name: Sync headers from upstream repository (brew)

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force publish the headers'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 2 * * 1" # Runs at 02:00 UTC every Monday

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-main
  cancel-in-progress: true

jobs:
  sync-headers:
    name: "Sync headers from upstream repository (brew)"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build-wheel.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      
      - name: Enable brew
        run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Install brew
        run: |
           brew update
           brew install nlohmann-json boost eigen msgpack-cxx doctest cli11 cmake

      - name: copy headers
        run: |
          ./sync-headers.sh

      - name: License scan - entire repository
        uses: fossology/fossology-action@77ce100b60db6a92aa122c9103908dda44a06514 # v1
        continue-on-error: true
        with:
            scan_mode: repo
            scanners: 'nomos ojo'
            report_format: 'SPDX_JSON'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Remove files with non-accepted license
        id: license-cleanup
        run: |
          ./remove-bad-licenses.sh

      - name: License cleanup completed
        run: echo "License cleanup completed successfully"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
          
      - name: build wheel
        id: build-wheel
        run: |
          echo "$(date +'%Y.%m.%d').$GITHUB_RUN_NUMBER" > VERSION
          uv build
          ls dist/
          echo "version=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: test in cmake
        run: |
          uv tool install dist/*.whl
          pgm-build-setup-ga-ci
          cd test_cmake
          cmake -S . -B build
          cmake --build build
          ./build/test_cmake

      - name: Upload release assets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.whl
            results/*

  publish-headers:
    name: "Publish headers to GitHub release"
    if: ${{ inputs.force_publish || (github.event_name == 'schedule') }}
    runs-on: ubuntu-latest
    needs: sync-headers
    environment: release
    steps:
      - name: generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.RELEASE_BOT_APP_ID  }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          repositories: ${{ github.repository }}

      - name: Download release assets artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: publish
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.sync-headers.outputs.version }}
          files: |
            release-assets/dist/*.whl
            release-assets/results/*
          draft: false
          prerelease: false
          target_commitish: ${{ github.sha }}
          token: ${{ steps.generate-token.outputs.token }}
